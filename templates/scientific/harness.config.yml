# ============================================================================
# harness.config.yml — scientific computing & research recipe.
#
#   ./assemble.sh scientific/harness.config.yml /path/to/your/project
#
# The deliverable is a reproducible manuscript: code runs in a pinned env and
# renders to LaTeX/Typst/HTML. The non-default choices make reproducibility
# and judgment-call review mechanical.
# ============================================================================

project:
  name: my-project
  domain: scientific

# ── MEMORY ──────────────────────────────────────────────────────────────────
memory:
  backend: md-files          # default — methods notes and decisions stay
                             # git-diffable next to the manuscript source.

# ── PROGRESS TRACKING ───────────────────────────────────────────────────────
progress:
  backend: filesystem        # default — research cadence is solo/small-lab.

# ── METHODOLOGY ─────────────────────────────────────────────────────────────
methodology:
  tdd: true                  # default — analysis functions and stats helpers
                             # get tests so figures rest on verified code.
  spec_driven: true          # ON — the manuscript/analysis spec (hypotheses,
                             # methods, expected figures) is the contract the
                             # whole pipeline is built against.
  eval_driven: true          # ON — research has judgment calls (model choice,
                             # outlier handling, prompt-graded extractions);
                             # a golden eval set keeps those decisions honest
                             # and reproducible instead of ad hoc.
  bdd: false                 # default — no non-technical behavior sign-off.

# ── ORCHESTRATION ───────────────────────────────────────────────────────────
orchestration:
  topology: single-agent     # default — one agent owns code, pipeline, render.

# ── SAFETY ──────────────────────────────────────────────────────────────────
safety:
  two_key: false             # default — no prod/money/deletion surface.
  kill_switch: false         # default.
  sandbox: false             # default — local analysis, trusted data inputs.

# ── HUMAN-IN-THE-LOOP ───────────────────────────────────────────────────────
hitl:
  plan_mode_default: true    # default.
  diff_review_required: true # default.
