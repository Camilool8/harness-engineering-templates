# ============================================================================
# harness.config.yml — mobile recipe (iOS / Android / React Native / Flutter).
#
#   ./assemble.sh mobile/harness.config.yml /path/to/your/project
# ============================================================================

project:
  name: my-mobile-app
  domain: mobile

# ── MEMORY ──────────────────────────────────────────────────────────────────
memory:
  backend: md-files          # code-shaped knowledge; CLAUDE.md per module.

# ── PROGRESS TRACKING ───────────────────────────────────────────────────────
progress:
  backend: linear            # mobile product teams commonly run on Linear,
                             # and its MCP keeps work items in the agent loop.

# ── METHODOLOGY ─────────────────────────────────────────────────────────────
methodology:
  tdd: true                  # ON where deterministic — view models, reducers,
                             # networking, formatting. UI verification is the
                             # simulator loop, not a unit test.
  spec_driven: true          # the feature/screen contract before code.
  eval_driven: false         # no LLM/ML output surface.
  bdd: false

# ── ORCHESTRATION ───────────────────────────────────────────────────────────
orchestration:
  topology: single-agent     # one agent owns the build/simulator loop.

# ── SAFETY ──────────────────────────────────────────────────────────────────
safety:
  two_key: false             # no prod/money/deletion tooling.
  kill_switch: false
  sandbox: false

# ── HUMAN-IN-THE-LOOP ───────────────────────────────────────────────────────
hitl:
  plan_mode_default: true
  diff_review_required: true
