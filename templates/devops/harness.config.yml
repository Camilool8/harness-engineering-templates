# ============================================================================
# harness.config.yml — devops recipe (DevOps / SRE / Platform Engineering).
#
#   ./assemble.sh devops/harness.config.yml /path/to/your/project
# ============================================================================

project:
  name: my-platform
  domain: devops

# ── MEMORY ──────────────────────────────────────────────────────────────────
memory:
  backend: md-files          # runbooks, env notes, decisions as md.

# ── PROGRESS TRACKING ───────────────────────────────────────────────────────
progress:
  backend: github-issues     # platform work lives in the repo's Issues and
                             # ties to GitOps PRs / CI.

# ── METHODOLOGY ─────────────────────────────────────────────────────────────
methodology:
  tdd: true                  # policy-as-code and module logic get tests.
  spec_driven: true          # plan/diff before any infra change.
  eval_driven: false         # no LLM/ML output surface.
  bdd: false

# ── ORCHESTRATION ───────────────────────────────────────────────────────────
orchestration:
  topology: single-agent     # default; for multi-env estates use one subagent
                             # per environment, each with its own scoped,
                             # short-lived credentials (never inherited).

# ── SAFETY ──────────────────────────────────────────────────────────────────
safety:
  two_key: true              # ON: prod-touching infra needs typed-token
                             # confirmation — a single "y" is insufficient.
  kill_switch: true          # ON: out-of-band stop for autonomous/long-running
                             # deploy or remediation loops.
  sandbox: false             # the agent proposes; humans/CI apply.

# ── HUMAN-IN-THE-LOOP ───────────────────────────────────────────────────────
hitl:
  plan_mode_default: true
  diff_review_required: true
