# ============================================================================
# harness.config.yml — generic recipe (base only, all defaults).
#
# This is the "start here if unsure" manifest. It is byte-identical in intent
# to templates/harness.config.yml: every value is the 2026 practitioner
# default. Assemble it, ship, and graduate to a domain recipe later.
#
#   ./assemble.sh generic/harness.config.yml /path/to/your/project
# ============================================================================

project:
  name: my-project
  domain: generic

# ── MEMORY ──────────────────────────────────────────────────────────────────
memory:
  backend: md-files

# ── PROGRESS TRACKING ───────────────────────────────────────────────────────
progress:
  backend: filesystem

# ── METHODOLOGY ─────────────────────────────────────────────────────────────
methodology:
  tdd: true
  spec_driven: true
  eval_driven: false
  bdd: false

# ── ORCHESTRATION ───────────────────────────────────────────────────────────
orchestration:
  topology: single-agent

# ── SAFETY ──────────────────────────────────────────────────────────────────
# secret-scan + command-guard + audit-log + verify-gate always ship in _base.
safety:
  two_key: false
  kill_switch: false
  sandbox: false

# ── HUMAN-IN-THE-LOOP ───────────────────────────────────────────────────────
hitl:
  plan_mode_default: true
  diff_review_required: true
