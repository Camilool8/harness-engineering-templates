name: Enhancement
description: Improve the core, the test engine, or an existing module/addon/sub-domain.
labels: ["enhancement"]
body:
  - type: input
    id: target
    attributes:
      label: What should change
      description: The file or unit you want improved.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Why now?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
